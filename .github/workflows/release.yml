name: Release

# Build the wheel + sdist on a version tag, verify the tag matches the package version, and
# attach the artifacts to a GitHub Release. Adopters can then pin an exact, reproducible build
# instead of tracking main. No PyPI publish (this is a synthetic-data reference pattern, not a
# distributed service) -- artifacts are attached to the Release only.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create the GitHub Release and upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import re,pathlib; t=pathlib.Path('src/fabric_phi_deid/__init__.py').read_text(); print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', t).group(1))")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package __version__ $PKG. Bump the version before tagging."
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Create GitHub Release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
